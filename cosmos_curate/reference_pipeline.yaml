name: custom-image-cosmos
image_uri: 367974485317.dkr.ecr.us-west-2.amazonaws.com/wagner-west-2:15 
ray_version: 2.48.0
entrypoint: >
  python all_nodes_init_script.py
  && pixi run python -m cosmos_curate.pipelines.video.run_pipeline split
  --input-video-path "s3://ray-example-data/videos/Hollywood2-actions-videos/Hollywood2/AVIClips/"
  --output-clip-path "/mnt/user_storage/output_clips3/"
py_modules: ["/Users/davidwagner/git/cosmos-curate"]
compute_config:
  head_node:
    instance_type: m5.2xlarge 
    resources:
      CPU: 8
      GPU: 0
    flags: {}
  worker_nodes:
    - instance_type: g6e.4xlarge
      flags: {}
      min_nodes: 4
      max_nodes: 4
      market_type: ON_DEMAND
working_dir: "."
max_retries: 0
env_vars:
    PIXI_PROJECT_MANIFEST: /opt/cosmos-curate/pixi.toml
