name: fast-model-loading

containerfile: ./Dockerfile

# GCP worker nodes with 8x A100 GPUs and 6x 375GB NVMe local SSDs (~2.2 TB).
# Anyscale RAIDs and mounts the NVMe disks at /mnt/local_storage.
compute_config:
  worker_nodes:
    - instance_type: a2-highgpu-8g-nvidia-a100-40gb-8
      min_nodes: 0
      max_nodes: 4
      market_type: PREFER_SPOT
      advanced_instance_config:
        instanceProperties:
          disks:
            - boot: true
              type: PERSISTENT
              initializeParams:
                diskSizeGb: 200
            # 6x NVMe local SSDs = 6 * 375 GB = 2,250 GB (~2.2 TB)
            - type: SCRATCH
              interface: NVME
              autoDelete: true
              initializeParams:
                diskType: local-ssd
            - type: SCRATCH
              interface: NVME
              autoDelete: true
              initializeParams:
                diskType: local-ssd
            - type: SCRATCH
              interface: NVME
              autoDelete: true
              initializeParams:
                diskType: local-ssd
            - type: SCRATCH
              interface: NVME
              autoDelete: true
              initializeParams:
                diskType: local-ssd
            - type: SCRATCH
              interface: NVME
              autoDelete: true
              initializeParams:
                diskType: local-ssd
            - type: SCRATCH
              interface: NVME
              autoDelete: true
              initializeParams:
                diskType: local-ssd

working_dir: .

cloud:

applications:
- import_path: serve:app
