name: fast-model-loading-hf

containerfile: ./Dockerfile

compute_config:
  worker_nodes:
    - instance_type: a2-highgpu-8g-nvidia-a100-40gb-8
      min_nodes: 0
      max_nodes: 4
      market_type: PREFER_SPOT
      advanced_instance_config:
        instanceProperties:
          disks:
            - boot: true
              type: PERSISTENT
              initializeParams:
                diskSizeGb: 200
            # 6x NVMe local SSDs (375 GB each = ~2.2 TB total).
            # Anyscale RAIDs and mounts them at /mnt/local_storage.
            # Each disk must be listed separately (GCP API requirement).
            - &nvme {type: SCRATCH, interface: NVME, autoDelete: true, initializeParams: {diskType: local-ssd}}
            - *nvme
            - *nvme
            - *nvme
            - *nvme
            - *nvme

working_dir: .

cloud:

applications:
- import_path: serve_hf:app
