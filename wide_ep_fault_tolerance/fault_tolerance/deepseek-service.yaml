# Fault Tolerance Wide EP Service Demo — DeepSeek V3 + UCCL EP
# - Deploys deepseek-ai/DeepSeek-V3-0324 with dp_size=16, num_replicas=1
#   (1 DP group x 16 workers = 16 GPU workers across 2x 8xH100 nodes)
# - Builds a custom image with EFA SDK, UCCL EP, and deep_ep wrapper
# - Includes an endpoint to simulate a fault by killing a GPU worker process
#
# Deploy with: anyscale service deploy -f fault_tolerance/deepseek-service.yaml

name: wide-ep-fault-tolerance-deepseek

containerfile: fault_tolerance/Dockerfile

compute_config:
  head_node:
    required_resources:
      CPU: 4
      memory: 16Gi
  worker_nodes:
    - required_resources:
        CPU: 192
        GPU: 8
        accelerator: H100
        memory: 2048Gi
      min_nodes: 2
      max_nodes: 2

applications:
  - name: llm-endpoint
    route_prefix: /
    import_path: ray.serve.llm:build_dp_openai_app
    args:
      llm_config:
        model_loading_config:
          model_id: deepseek-ai/DeepSeek-V3-0324
          model_source: deepseek-ai/DeepSeek-V3-0324
        deployment_config:
          num_replicas: 1
          health_check_period_s: 5
          health_check_timeout_s: 30
        engine_kwargs:
          tensor_parallel_size: 1
          data_parallel_size: 16
          distributed_executor_backend: ray
          enable_expert_parallel: true
          all2all_backend: deepep_low_latency
          trust_remote_code: true
          max_model_len: 1024
          max_num_seqs: 4
          max_num_batched_tokens: 256
          gpu_memory_utilization: 0.90
          dtype: auto
        runtime_env:
          env_vars:
            VLLM_DEEPEP_BUFFER_SIZE_MB: "256"
            VLLM_MOE_DP_CHUNK_SIZE: "32"

  - name: simulate-fault
    route_prefix: /simulate-fault
    import_path: kill_worker_proc:app
    runtime_env:
      working_dir: fault_tolerance
