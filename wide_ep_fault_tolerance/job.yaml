# Anyscale Job: DP Group Fault Tolerance Demo
#
# Deploys microsoft/Phi-tiny-MoE-instruct with dp_size=2, num_replicas=2,
# sends continuous traffic, kills one GPU process to trigger gang recovery,
# and verifies all replicas come back healthy.
#
# Submit:
#   anyscale job submit -f job.yaml

name: dp-group-fault-tolerance-demo

image_uri: anyscale/ray-llm:nightly-py311-cu128

compute_config:
  head_node:
    required_resources:
      CPU: 4
      memory: 16Gi
  worker_nodes:
    - required_resources:
        CPU: 48
        GPU: 4
        accelerator: L4
        memory: 192Gi
      min_nodes: 1
      max_nodes: 1

working_dir: .

entrypoint: python fault_tolerance_demo.py

max_retries: 0
