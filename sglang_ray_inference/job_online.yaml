# Anyscale Job: SGLang Online (HTTP Server) Inference with Ray Actor Backend
#
# Configuration: TP=8 across 2 nodes (4 GPUs per node)
# Submit: anyscale job submit -f examples/anyscale/job_online.yaml

name: sglang-online-inference

cloud:

compute_config:
  head_node:
    instance_type: m5.2xlarge        # CPU-only head
  worker_nodes:
    - instance_type: g5.12xlarge     # 4x A10G
      min_nodes: 2
      max_nodes: 2

containerfile: ./Dockerfile

working_dir: .

entrypoint: |
  set -e

  echo "=========================================="
  echo "Running online inference..."
  echo "=========================================="

  # Start online HTTP server
  echo "Starting online server..."
  echo "=========================================="
  python driver_online.py \
    --model-path Qwen/Qwen3-1.7B --tp-size 8 --nnodes 2

env_vars:
  NCCL_IB_DISABLE: "0"
  NCCL_NET_GDR_LEVEL: "2"
  RAY_EXPERIMENTAL_NOSET_CUDA_VISIBLE_DEVICES: "1"
  SGLANG_SKIP_SGL_KERNEL_VERSION_CHECK: "1"

max_retries: 0
